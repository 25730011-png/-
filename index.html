<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>바리 : 핏빛 안개의 저택</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--blood:#7a0f0f;--gold:#c8b18d;--text:#e9e1d4;}
*{box-sizing:border-box} html,body{height:100%;margin:0;background:#000;color:var(--text);font-family:'Noto Serif KR',serif;}
#cover{position:fixed;inset:0}
#cover video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;background:linear-gradient(90deg,transparent 30%,rgba(0,0,0,.85));}
.menu{position:absolute;right:7%;top:50%;transform:translateY(-50%);width:min(460px,90vw);text-align:right}
.id{color:var(--gold);letter-spacing:.2em}
.title{font:900 clamp(4rem,10vw,8rem) Cinzel,serif;color:#b51616;text-shadow:0 0 30px #450000;margin:0}
.sub{font:700 2rem 'Cormorant Garamond',serif}
.btn{width:100%;padding:16px;margin:10px 0;background:#120808cc;color:var(--text);border:1px solid var(--gold)}
.btn:hover{box-shadow:0 0 25px rgba(122,15,15,.8)}
#game{display:none;height:100%;flex-direction:column}
#scene{flex:1;position:relative}
#scene video{width:100%;height:100%;object-fit:cover}
#ui{height:42vh;display:flex;background:#090909f0;border-top:1px solid #433}
#dialog{flex:1;padding:20px;overflow-y:auto;padding-bottom:140px}
#choices{width:320px;overflow-y:auto;padding:12px}
.choice{padding:14px;margin-bottom:10px;background:#180808;border-left:4px solid var(--gold);border:1px solid #522}
</style>
</head>
<body>
<div id="cover">
<video autoplay muted loop playsinline><source src="media/Cover.mp4" type="video/mp4"></video>
<div class="overlay"></div>
<div class="menu">
<div class="id">25730011 · 정유진</div>
<h1 class="title">바리</h1>
<div class="sub">핏빛 안개의 저택</div>
<button class="btn" onclick="startGame()">START NEW GAME</button>
</div>
</div>

<div id="game">
<div id="scene">
<video autoplay muted loop><source src="media/S1.mp4" type="video/mp4"></video>
</div>
<div id="ui">
<div id="dialog">
<h3>내레이션</h3>
<p>이 영역은 스크롤됩니다. 긴 대사가 들어와도 잘리지 않습니다.</p>
<p>S1~S6 대사와 mp3를 기존 로직에 연결하세요.</p>
</div>
<div id="choices">
<div class="choice">문을 연다</div>
<div class="choice">뒤를 돌아본다</div>
<div class="choice">계속 걷는다</div>
</div>
</div>
</div>

<audio id="bgm" loop><source src="voice/BGM.mp3" type="audio/mpeg"></audio>
<script>
function startGame(){
 document.getElementById('cover').style.display='none';
 document.getElementById('game').style.display='flex';
 const b=document.getElementById('bgm');
 b.volume=.25;
 b.play().catch(()=>{});
}
</script>
</body></html>
